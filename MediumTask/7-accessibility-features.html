<!DOCTYPE html>
<html>

<head>
    <title>Accessibility Features</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <h1>Accessibility Example</h1>

    <form>
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" title="Please enter your full name"
            aria-label="Full Name" required>

        <br><br>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" title="Please enter a valid email"
            aria-label="Email Address" required>

        <br><br>

        <button type="submit" aria-label="Submit Form">Submit</button>
    </form>

</body>

</html>
