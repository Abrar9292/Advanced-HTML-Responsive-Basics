<!DOCTYPE html>
<html>

<head>
    <title>HR Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .dashboard {
            display: flex;
            gap: 20px;
        }

        .sidebar {
            width: 25%;
        }

        .content {
            width: 75%;
        }
    </style>
</head>

<body>

    <header>
        <h1>HR Management Dashboard</h1>
    </header>


    <div class="dashboard">
        <aside class="sidebar">
            <h3>Menu</h3>
            <ul>
                <li>Employees</li>
                <li>Attendance</li>
                <li>Payroll</li>
            </ul>

        </aside>

        <section class="content">
            <h2>Employee Overview</h2>
            <p>Total Employees: 120</p>
        </section>
    </div>

    <footer>
        <p>© 2026 HR Dashboard</p>
    </footer>
</body>

</html>
